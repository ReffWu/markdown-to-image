<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .card {
      width: 1440px;
      height: 2400px;
      background-color: {{backgroundColor}};
      color: {{textColor}};
      padding: 130px 120px;
      padding-bottom: 130px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* GitHub Markdown 样式覆盖 */
    .markdown-body {
      font-size: 48px !important;
      line-height: 1.8 !important;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: {{textColor}};
      background-color: transparent !important;
    }

    /* 段落样式 */
    .markdown-body p {
      margin-bottom: 72px;
      text-align: left;
      word-break: break-word;
    }

    .markdown-body p:last-child {
      margin-bottom: 0;
    }

    /* 标题样式 */
    .markdown-body h1 {
      font-size: 72px;
      margin-bottom: 72px;
      font-weight: bold;
    }

    .markdown-body h2 {
      font-size: 64px;
      margin-bottom: 64px;
      font-weight: bold;
    }

    .markdown-body h3 {
      font-size: 56px;
      margin-bottom: 56px;
      font-weight: bold;
    }

    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      font-size: 52px;
      margin-bottom: 52px;
      font-weight: bold;
    }

    /* 代码块样式 */
    .markdown-body pre {
      background-color: #f6f8fa !important;
      padding: 30px !important;
      border-radius: 12px !important;
      font-size: 42px !important;
      line-height: 1.6 !important;
      overflow-x: visible !important;
      overflow-wrap: break-word !important;
      word-wrap: break-word !important;
      white-space: pre-wrap !important;
      margin-bottom: 72px !important;
    }

    .markdown-body code {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace !important;
      background-color: #f6f8fa !important;
      padding: 4px 8px !important;
      border-radius: 6px !important;
      font-size: 44px !important;
    }

    .markdown-body pre code {
      background-color: transparent !important;
      padding: 0 !important;
      font-size: 42px !important;
      white-space: pre-wrap !important;
      word-break: break-all !important;
    }

    /* 超长代码块自动缩小 */
    .markdown-body pre.oversized {
      font-size: 32px !important;
    }

    .markdown-body pre.oversized code {
      font-size: 32px !important;
    }

    /* 列表样式 */
    .markdown-body ul,
    .markdown-body ol {
      padding-left: 60px;
      margin-bottom: 72px;
    }

    .markdown-body li {
      margin-bottom: 36px;
      font-size: 48px;
      line-height: 1.8;
    }

    /* 粗体、斜体 */
    .markdown-body strong {
      font-weight: bold;
    }

    .markdown-body em {
      font-style: italic;
    }

    /* 引用 */
    .markdown-body blockquote {
      border-left: 8px solid #dfe2e5;
      padding-left: 40px;
      color: #6a737d;
      margin-bottom: 72px;
    }

    /* 表格样式 */
    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 72px;
      font-size: 42px;
    }

    .markdown-body th,
    .markdown-body td {
      border: 2px solid #dfe2e5;
      padding: 20px 30px;
      text-align: left;
    }

    .markdown-body th {
      background-color: #f6f8fa;
      font-weight: bold;
    }

    .markdown-body tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    /* 图片样式 */
    .image-block {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 60px 0;
    }

    .image-block:first-child {
      margin-top: 0;
    }

    .image-block:last-child {
      margin-bottom: 0;
    }

    .image-block img {
      max-width: 100%;
      max-height: 1800px; /* 限制图片最大高度 */
      height: auto;
      display: block;
    }

    /* Mermaid 图表样式 */
    .mermaid-block {
      width: 100%;
      margin-bottom: 72px;
    }

    .mermaid-block:last-child {
      margin-bottom: 0;
    }

    .mermaid-block svg {
      width: 100% !important;
      height: auto !important;
      max-width: 100%;
    }

    /* HTML 块样式 */
    .html-block {
      margin-bottom: 0;
    }

    .html-block:last-child {
      margin-bottom: 0;
    }

    .card-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 120px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .card-footer.page-format-total,
    .card-footer.page-format-brackets {
      display: none;
    }

    body[data-page-format="total"] .card-footer.default-footer,
    body[data-page-format="brackets"] .card-footer.default-footer {
      display: none;
    }
    body[data-page-format="total"] .card-footer.page-format-total,
    body[data-page-format="brackets"] .card-footer.page-format-brackets {
      display: flex;
    }

    body[data-page-format="brackets"] .card-footer.page-format-total {
      display: none;
    }
    body[data-page-format="total"] .card-footer.page-format-brackets {
      display: none;
    }

    .page-indicator {
      font-size: 22px;
      font-weight: 500;
      color: #86868b;
      letter-spacing: 0.02em;
    }

    .page-indicator span.total {
      opacity: 0.5;
    }
  </style>
</head>
<body data-page-format="{{pageFormat}}">
  <div class="card">
    <div class="content-wrapper">
      <div class="markdown-body">
        {{content}}
      </div>
    </div>
    <div class="card-footer default-footer">
      <div class="page-indicator">{{pageNumber}}</div>
    </div>
    <div class="card-footer page-format-total">
      <div class="page-indicator">{{pageNumber}}<span class="total"> / {{totalPages}}</span></div>
    </div>
    <div class="card-footer page-format-brackets">
      <div class="page-indicator">({{pageNumber}}/{{totalPages}})</div>
    </div>
  </div>
</body>
</html>
